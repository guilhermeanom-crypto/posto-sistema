# ─────────────────────────────────────────────────────────────────────────────
# HÁBILIS POSTO — Docker Compose Produção
# Uso: docker compose -f docker-compose.prod.yml --env-file .env up -d
# ─────────────────────────────────────────────────────────────────────────────

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "5"

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    <<: [*restart, *logging]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [posto-net]

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    <<: [*restart, *logging]
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [posto-net]

  # ── MinIO (S3 compatível) ────────────────────────────────────────────────────
  minio:
    <<: [*restart, *logging]
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks: [posto-net]

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/posto-documentos;
        mc anonymous set none local/posto-documentos;
        echo 'MinIO: bucket configurado.';
      "
    networks: [posto-net]
    restart: on-failure

  # ── API (Fastify) ────────────────────────────────────────────────────────────
  api:
    <<: [*restart, *logging]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        NODE_ENV: production
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
      INTEGRATION_SHARED_SECRET: ${INTEGRATION_SHARED_SECRET}
      API_URL: ${API_URL}
      WEB_URL: ${WEB_URL}
      API_PORT: 3001
      API_HOST: 0.0.0.0
      LOG_LEVEL: ${LOG_LEVEL:-info}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-s3}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      PRESIGNED_URL_EXPIRES_SECONDS: ${PRESIGNED_URL_EXPIRES_SECONDS:-900}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Hábilis Posto}
      ZAPI_INSTANCE_ID: ${ZAPI_INSTANCE_ID:-}
      ZAPI_TOKEN: ${ZAPI_TOKEN:-}
      ZAPI_CLIENT_TOKEN: ${ZAPI_CLIENT_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks: [posto-net]

  # ── Migração (roda uma vez na inicialização) ──────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["prisma", "migrate", "deploy", "--schema", "apps/api/prisma/schema.prisma"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [posto-net]
    restart: on-failure

  # ── Worker (BullMQ) ──────────────────────────────────────────────────────────
  worker:
    <<: [*restart, *logging]
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      WEB_URL: ${WEB_URL}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      WORKER_HEALTH_PORT: 9090
      ZAPI_INSTANCE_ID: ${ZAPI_INSTANCE_ID:-}
      ZAPI_TOKEN: ${ZAPI_TOKEN:-}
      ZAPI_CLIENT_TOKEN: ${ZAPI_CLIENT_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks: [posto-net]

  # ── Web (Next.js) ────────────────────────────────────────────────────────────
  web:
    <<: [*restart, *logging]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        WEB_ALLOWED_ORIGINS: ${WEB_ALLOWED_ORIGINS:-}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks: [posto-net]

  # ── Site institucional (Next.js — vitrine pública) ───────────────────────────
  site:
    <<: [*restart, *logging]
    build:
      context: .
      dockerfile: apps/site/Dockerfile
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks: [posto-net]

  # ── Nginx (reverse proxy + SSL termination) ───────────────────────────────────
  nginx:
    <<: [*restart, *logging]
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - web
      - site
    networks: [posto-net]

  # ── Backup automático do Postgres (pg_dump agendado + retenção) ───────────────
  postgres-backup:
    <<: [*restart, *logging]
    image: prodrigestivill/postgres-backup-local:16-alpine
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: ${BACKUP_SCHEDULE:-@daily}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      BACKUP_KEEP_WEEKS: ${BACKUP_KEEP_WEEKS:-4}
      BACKUP_KEEP_MONTHS: ${BACKUP_KEEP_MONTHS:-6}
      HEALTHCHECK_PORT: 8080
    volumes:
      - postgres_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks: [posto-net]

networks:
  posto-net:
    driver: bridge

volumes:
  postgres_data:
  postgres_backups:
  redis_data:
  minio_data:
  nginx_logs:
